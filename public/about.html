<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — Whistle</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">

        <header class="masthead">
            <div class="masthead__date" id="masthead-date"></div>
            <a href="/app.html" class="masthead__title">
                Whistle.
                <small>Est. 2026</small>
            </a>
            <div class="masthead__motto"></div>
        </header>

        <nav class="nav">
            <div class="nav__items" id="nav-items"></div>
            <div class="nav__user" id="nav-user"></div>
        </nav>

        <div class="about-hero">
            <div class="about-hero__num">№ 00</div>
            <h1 class="about-hero__title">About Whistle.</h1>
            <p class="about-hero__lead">
                An opinionated punch clock for people who believe work has its hours, and rest has its own.
            </p>
        </div>

        <div class="about-content" id="about-content">Loading…</div>

        <footer class="footer">
            <a href="/about.html"><img src="/pics/footer.png" alt="" class="footer__img"></a>
        </footer>

    </div>

    <script>
        function renderMarkdown(md) {
            var lines = md.split('\n');
            var html = '';
            var inList = false;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];
                if (line.match(/^# /) && i < 3) continue;

                if (line.match(/^### /)) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h3>' + line.replace(/^### /, '') + '</h3>';
                } else if (line.match(/^## /)) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h2>' + line.replace(/^## /, '') + '</h2>';
                } else if (line.match(/^- /)) {
                    if (!inList) { html += '<ul>'; inList = true; }
                    var content = line.replace(/^- /, '').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    html += '<li>' + content + '</li>';
                } else if (line.trim() === '') {
                    if (inList) { html += '</ul>'; inList = false; }
                } else {
                    if (inList) { html += '</ul>'; inList = false; }
                    var text = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    html += '<p>' + text + '</p>';
                }
            }
            if (inList) html += '</ul>';
            return html;
        }

        function buildNav(signedIn) {
            var navItems = document.getElementById('nav-items');
            var navUser = document.getElementById('nav-user');

            if (signedIn) {
                navItems.innerHTML =
                    '<a href="/app.html" class="nav__item"><span class="nav__num">01</span>Punch Clock</a>' +
                    '<a href="/leaderboard.html" class="nav__item"><span class="nav__num">02</span>Factory Floor</a>' +
                    '<a href="/profile.html" class="nav__item"><span class="nav__num">03</span>Set Up</a>' +
                    '<a href="/about.html" class="nav__item is-active"><span class="nav__num">04</span>About</a>';
                navUser.innerHTML = '<button id="logout-btn" type="button">Sign Out</button>';

                document.getElementById('logout-btn').addEventListener('click', async function() {
                    try {
                        var statusRes = await fetch('/api/time/status');
                        var statusData = await statusRes.json();
                        if (statusData.is_working) {
                            if (!confirm('Signing out will clock you out. Continue?')) return;
                        }
                        await fetch('/api/auth/logout', { method: 'POST' });
                    } catch (e) {}
                    window.location.href = '/index.html';
                });
            } else {
                navItems.innerHTML =
                    '<a href="/leaderboard.html" class="nav__item"><span class="nav__num">02</span>Factory Floor</a>' +
                    '<a href="/about.html" class="nav__item is-active"><span class="nav__num">04</span>About</a>';
                navUser.innerHTML = '<a href="/index.html">Sign In</a>';
            }
        }

        document.addEventListener('DOMContentLoaded', async function() {
            var today = new Date();
            document.getElementById('masthead-date').textContent =
                today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

            try {
                var response = await fetch('/api/auth/me');
                var data = await response.json();
                buildNav(!!data.user);
            } catch (error) {
                buildNav(false);
            }

            try {
                var mdResponse = await fetch('/ABOUT.md');
                var md = await mdResponse.text();
                document.getElementById('about-content').innerHTML = renderMarkdown(md);
            } catch (error) {
                document.getElementById('about-content').textContent = 'Failed to load content.';
            }
        });
    </script>
</body>
</html>
