<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - Whistle</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container app-container">

        <header class="app-header">
            <a href="/app.html" class="logo">Whistle</a>
            <nav class="app-nav" id="nav-links"></nav>
        </header>

        <section class="about-section">
            <h2 class="section-title">About Whistle</h2>
            <div class="card about-card">
                <div class="about-content" id="about-content">Loading...</div>
            </div>
        </section>

        <footer class="app-footer">
            <a href="/about.html"><img src="/pics/footer.png" alt="" class="footer-illustration"></a>
        </footer>

    </div>

    <script>
        // Simple markdown to HTML (handles #, ##, ###, **, -, blank lines)
        function renderMarkdown(md) {
            var lines = md.split('\n');
            var html = '';
            var inList = false;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];

                // Skip the first H1 (we already have the page title)
                if (line.match(/^# /) && i < 3) continue;

                if (line.match(/^### /)) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h3>' + line.replace(/^### /, '') + '</h3>';
                } else if (line.match(/^## /)) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h2>' + line.replace(/^## /, '') + '</h2>';
                } else if (line.match(/^- /)) {
                    if (!inList) { html += '<ul>'; inList = true; }
                    var content = line.replace(/^- /, '').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    html += '<li>' + content + '</li>';
                } else if (line.trim() === '') {
                    if (inList) { html += '</ul>'; inList = false; }
                } else {
                    if (inList) { html += '</ul>'; inList = false; }
                    var text = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    html += '<p>' + text + '</p>';
                }
            }
            if (inList) html += '</ul>';
            return html;
        }

        document.addEventListener('DOMContentLoaded', async function() {
            var navLinks = document.getElementById('nav-links');

            // Setup nav
            try {
                var response = await fetch('/api/auth/me');
                var data = await response.json();

                if (data.user) {
                    navLinks.innerHTML =
                        '<a href="/leaderboard.html" class="nav-link">Factory Floor</a>' +
                        '<a href="/about.html" class="nav-link">About</a>' +
                        '<a href="/profile.html" class="nav-link">Profile</a>' +
                        '<button id="logout-button" class="nav-link button-link">Sign Out</button>';

                    document.getElementById('logout-button').addEventListener('click', async function() {
                        try {
                            var statusRes = await fetch('/api/time/status');
                            var statusData = await statusRes.json();
                            if (statusData.is_working) {
                                if (!confirm('Signing out will clock you out. Continue?')) return;
                            }
                            await fetch('/api/auth/logout', { method: 'POST' });
                        } catch (e) {}
                        window.location.href = '/index.html';
                    });
                } else {
                    navLinks.innerHTML =
                        '<a href="/leaderboard.html" class="nav-link">Factory Floor</a>' +
                        '<a href="/about.html" class="nav-link">About</a>' +
                        '<a href="/index.html" class="nav-link">Sign In</a>';
                }
            } catch (error) {
                navLinks.innerHTML =
                    '<a href="/leaderboard.html" class="nav-link">Factory Floor</a>' +
                    '<a href="/about.html" class="nav-link">About</a>' +
                    '<a href="/index.html" class="nav-link">Sign In</a>';
            }

            // Load and render ABOUT.md
            try {
                var mdResponse = await fetch('/ABOUT.md');
                var md = await mdResponse.text();
                document.getElementById('about-content').innerHTML = renderMarkdown(md);
            } catch (error) {
                document.getElementById('about-content').textContent = 'Failed to load content.';
            }
        });
    </script>
</body>
</html>
