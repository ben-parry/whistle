<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whistle - Punch Clock</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container app-container">

        <header class="app-header">
            <a href="/app.html" class="logo">Whistle</a>
            <nav class="app-nav">
                <a href="/leaderboard.html" class="nav-link">Factory Floor</a>
                <a href="/about.html" class="nav-link">About</a>
                <a href="/profile.html" class="nav-link">Profile</a>
                <button id="logout-button" class="nav-link button-link">Sign Out</button>
            </nav>
        </header>

        <!-- PUNCH CLOCK SECTION -->
        <section class="punch-section">
            <div id="status-display" class="status-display">
                <p id="status-text" class="status-text">Loading...</p>
                <p id="elapsed-time" class="elapsed-time" hidden>00:00:00</p>
            <div id="shift-progress-wrapper" class="shift-progress-wrapper" hidden>
                <div class="shift-progress-container">
                    <div class="shift-progress-bar" id="shift-progress-bar"></div>
                </div>
                <span id="shift-progress-label" class="shift-progress-label-inline"></span>
            </div>
            </div>
            <button id="punch-button" class="punch-button" hidden disabled>
                <span id="punch-button-text">Loading...</span>
            </button>
            <div id="punch-timestamps" class="punch-timestamps" hidden></div>
            <p id="shift-complete-text" class="shift-complete-text" hidden>Shift complete!</p>
            <p id="punch-completed" class="punch-completed-message" hidden></p>
        </section>

        <!-- YEAR TOTAL SECTION -->
        <section class="stats-section">
            <div class="stat-card">
                <p class="stat-label">Hours worked in <span id="current-year">2026</span></p>
                <p id="year-total" class="stat-value">0</p>
                <div class="progress-wrapper">
                    <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
                    <a href="/about.html" class="info-icon" title="About Whistle">&#9432;</a>
                </div>
            </div>
        </section>

        <section id="sunday-content" class="sunday-section" hidden>
            <p class="sunday-quote">&ldquo;It is Sunday, let us seize the means of relaxation.&rdquo;</p>
            <a href="https://lavitalenta.substack.com/" target="_blank" rel="noopener" class="sunday-link">lavitalenta.substack.com</a>
            <img src="/pics/sunday.png" alt="Sunday" class="sunday-image">
        </section>

        <footer class="app-footer">
            <a href="/about.html"><img src="/pics/footer.png" alt="" class="footer-illustration"></a>
        </footer>

    </div>

    <script src="/js/app.js"></script>
</body>
</html>
