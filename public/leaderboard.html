<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Whistle</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container app-container">

        <header class="app-header">
            <a href="/app.html" class="logo">Whistle</a>
            <nav class="app-nav" id="nav-links">
                <!-- Set by JavaScript based on auth status -->
            </nav>
        </header>

        <section class="leaderboard-section">
            <h2 class="section-title">Leaderboard</h2>

            <div class="leaderboard-tabs">
                <button id="year-tab" class="tab-button active" type="button">
                    This Year
                </button>
                <button id="today-tab" class="tab-button" type="button">
                    Today
                </button>
            </div>

            <!-- YEARLY VIEW -->
            <div id="year-view">
                <table class="leaderboard-table" id="year-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Sessions</th>
                            <th>Hours</th>
                        </tr>
                    </thead>
                    <tbody id="year-body">
                        <tr><td colspan="4" class="leaderboard-empty">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- TODAY VIEW -->
            <div id="today-view" hidden>
                <table class="leaderboard-table" id="today-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Today</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="today-body">
                        <tr><td colspan="3" class="leaderboard-empty">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="app-footer">
            <div class="ornament">&#10022;</div>
        </footer>

    </div>

    <script src="/js/leaderboard.js"></script>
</body>
</html>
