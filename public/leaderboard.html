<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Whistle</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container app-container">

        <header class="app-header">
            <a href="/app.html" class="logo">Whistle</a>
            <nav class="app-nav" id="nav-links">
                <!-- Set by JavaScript based on auth status -->
            </nav>
        </header>

        <section class="leaderboard-section">
            <div class="leaderboard-header">
                <h2 class="section-title">Leaderboard</h2>
                <div class="leaderboard-toggle" id="leaderboard-toggle">
                    <button id="sort-year" class="toggle-btn active" onclick="setSort('year')">This Year</button>
                    <button id="sort-today" class="toggle-btn" onclick="setSort('today')">Today</button>
                </div>
            </div>

            <!-- Sunday poem container (hidden unless Sunday) -->
            <div id="sunday-content" hidden>
                <div class="sunday-poem">
                    <h3 class="poem-title" id="poem-title"></h3>
                    <div class="poem-text" id="poem-text"></div>
                    <p class="poem-attribution" id="poem-attribution"></p>
                </div>
            </div>

            <table class="leaderboard-table" id="leaderboard-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>This Year</th>
                        <th>Today</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="4" class="leaderboard-empty">Loading...</td></tr>
                </tbody>
            </table>
        </section>

        <footer class="app-footer">
            <div class="ornament">&#10022;</div>
        </footer>

    </div>

    <script src="/data/poems.js"></script>
    <script src="/js/leaderboard.js"></script>
</body>
</html>
