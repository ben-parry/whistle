<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Floor — Whistle</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app">

        <header class="masthead">
            <div class="masthead__date" id="masthead-date"></div>
            <a href="/app.html" class="masthead__title">
                Whistle.
                <small>Est. 2026</small>
            </a>
            <div class="masthead__motto"></div>
        </header>

        <nav class="nav">
            <div class="nav__items" id="nav-items">
                <a href="/leaderboard.html" class="nav__item is-active"><span class="nav__num">02</span>Factory Floor</a>
                <a href="/about.html" class="nav__item"><span class="nav__num">04</span>About</a>
            </div>
            <div class="nav__user" id="nav-user"></div>
        </nav>

        <section>
            <div class="section-head">
                <div class="section-head__left">
                    <span class="section-head__num">№ 02</span>
                    <h2>The Factory Floor</h2>
                </div>
                <div class="section-head__num" id="floor-date"></div>
            </div>

            <div id="sunday-content" hidden>
                <div class="sunday-poem">
                    <h3 class="poem-title" id="poem-title"></h3>
                    <div class="poem-text" id="poem-text"></div>
                    <p class="poem-attribution" id="poem-attribution"></p>
                </div>
            </div>

            <div class="floor" id="floor-table">
                <div class="floor__head">
                    <div>Rank</div>
                    <div>Worker</div>
                    <div>Today</div>
                    <div>State</div>
                </div>
                <div id="floor-body">
                    <div class="floor__empty">Loading…</div>
                </div>
            </div>
        </section>

        <footer class="footer">
            <a href="/about.html"><img src="/pics/footer.png" alt="" class="footer__img"></a>
        </footer>

    </div>

    <script src="/data/poems.js"></script>
    <script src="/js/leaderboard.js"></script>
</body>
</html>
