<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whistle - Punch Clock</title>

    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container auth-container">

        <header class="auth-header">
            <h1 class="logo">Whistle</h1>
            <p class="tagline">Your Personal Punch Clock</p>
        </header>

        <div class="card auth-card">

            <div class="auth-tabs">
                <button id="login-tab" class="tab-button active" type="button">
                    Sign In
                </button>
                <button id="register-tab" class="tab-button" type="button">
                    Create Account
                </button>
            </div>

            <div id="error-message" class="error-message" hidden></div>
            <div id="success-message" class="success-message" hidden></div>

            <!-- LOGIN FORM -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" required
                           autocomplete="email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required
                           autocomplete="current-password" placeholder="Your password">
                </div>
                <button type="submit" class="button button-primary">Sign In</button>
            </form>

            <!-- REGISTER FORM -->
            <form id="register-form" class="auth-form" hidden>
                <div class="form-group">
                    <label for="register-name">Full Name</label>
                    <input type="text" id="register-name" name="name" required
                           autocomplete="name" placeholder="Your real name">
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" name="email" required
                           autocomplete="email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" name="password" required
                           autocomplete="new-password" minlength="8"
                           placeholder="At least 8 characters">
                </div>
                <button type="submit" class="button button-primary">Create Account</button>
            </form>

            <p class="forgot-password">
                Forgot your password? Contact <a href="mailto:ben@benparry.ca">ben@benparry.ca</a>
            </p>

            <p class="about-link" style="text-align: center; margin-top: 16px; font-size: 14px;">
                <a href="/about.html">About Whistle</a>
            </p>

        </div>

        <footer class="auth-footer">
            <img src="/pics/footer.jpg" alt="" class="footer-illustration">
        </footer>

    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
